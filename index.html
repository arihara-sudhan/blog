---
layout: default
---
<!-- Posts -->

<ul id="posts"">

	{% for post in paginator.posts %}
	  <li class="post" style="margin: 0.7rem">
	  	<a href="{% if site.baseurl == '/' %}{{ post.url }}{% else %}{{ post.url | prepend: site.baseurl }}{% endif %}">
			<div style="display: flex; justify-content: space-between;">
				<b>{{ post.title }}</b>
				<p style="font-weight: normal;">{{ post.date | date_to_string }}</p>
			</div>
			<div style="display: flex; justify-content: space-between;" class="thumbnail">
				<img src="./img/covers/{{post.title}}.jpg" alt="cover" style="width: 10vw; margin-right: 0.7rem">
				<p style="text-align: justify; text-justify: inter-word; font-weight: normal;">{{ post.content | strip_html | truncatewords:100 }}</p>
			</div>
		</a>
	  </li>

    {% endfor %}

</ul>
